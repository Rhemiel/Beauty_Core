<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments | Andrea's Admin</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../admin.css" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body class="admin-body">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <span class="logo-main">ANDREA'S</span>
      <span class="logo-sub">Admin Panel</span>
    </div>
    <nav class="sidebar-nav-items">
      <p class="nav-section-label">Overview</p>
      <a href="dashboard.html" class="sidebar-link"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="0.5"/><rect x="9" y="1" width="6" height="6" rx="0.5"/><rect x="1" y="9" width="6" height="6" rx="0.5"/><rect x="9" y="9" width="6" height="6" rx="0.5"/></svg> Dashboard</a>
      <p class="nav-section-label">Management</p>
      <a href="appointments.html" class="sidebar-link active"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="13" rx="1"/><line x1="5" y1="1" x2="5" y2="4"/><line x1="11" y1="1" x2="11" y2="4"/><line x1="1" y1="6" x2="15" y2="6"/></svg> Appointments</a>
      <a href="clients.html" class="sidebar-link"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg> Clients (CRM)</a>
      <a href="inventory.html" class="sidebar-link"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="14" height="10" rx="1"/><path d="M5 4V3a3 3 0 016 0v1"/></svg> Inventory</a>
      <a href="finance.html" class="sidebar-link"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1"/><line x1="1" y1="7" x2="15" y2="7"/><line x1="5" y1="11" x2="7" y2="11"/></svg> Financial</a>
      <p class="nav-section-label">Settings</p>
      <a href="services-admin.html" class="sidebar-link"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2"/></svg> Services</a>
      <a href="staff.html" class="sidebar-link"><svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M1 14c0-2.8 2.2-5 5-5s5 2.2 5 5"/><circle cx="12" cy="5" r="2"/><path d="M12 10c1.7 0 3 1.3 3 3"/></svg> Staff</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div class="user-info"><p>Andrea</p><span>Administrator</span></div>
      </div>
      <a href="../login.html" class="logout-btn">Sign Out</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="admin-main">
    <header class="admin-topbar">
      <h1 class="topbar-title">Appointments</h1>
      <div class="topbar-right">
        <button class="btn-sm btn-sm-gold" onclick="openModal('addModal')">+ New Appointment</button>
      </div>
    </header>

    <div class="admin-content">

      <!-- Tabs -->
      <div class="admin-tabs">
        <button class="admin-tab-btn active" onclick="switchTab('all', this)">All</button>
        <button class="admin-tab-btn" onclick="switchTab('pending', this)">Pending</button>
        <button class="admin-tab-btn" onclick="switchTab('confirmed', this)">Confirmed</button>
        <button class="admin-tab-btn" onclick="switchTab('completed', this)">Completed</button>
        <button class="admin-tab-btn" onclick="switchTab('cancelled', this)">Cancelled</button>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search client or service..." oninput="filterTable()" />
        <input type="date" id="dateFilter" onchange="filterTable()" />
        <select id="statusFilter" onchange="filterTable()">
          <option value="">All Statuses</option>
          <option value="Confirmed">Confirmed</option>
          <option value="Pending">Pending</option>
          <option value="Completed">Completed</option>
          <option value="Cancelled">Cancelled</option>
        </select>
      </div>

      <div class="admin-card">
        <div class="admin-card-body" style="padding:0;">
          <table class="admin-table" id="apptTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Client</th>
                <th>Service</th>
                <th>Date</th>
                <th>Time</th>
                <th>Staff</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="apptBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ADD MODAL -->
  <div class="modal-overlay hidden" id="addModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">New Appointment</h3>
        <button class="modal-close" onclick="closeModal('addModal')">&#10005;</button>
      </div>
      <div class="modal-body">
        <form class="admin-form" id="addApptForm">
          <div class="form-row-2">
            <div class="form-group">
              <label>Client Name</label>
              <input type="text" id="newClient" placeholder="Full name" required />
            </div>
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" id="newPhone" placeholder="+63 912 345 6789" />
            </div>
          </div>
          <div class="form-group">
            <label>Service</label>
            <select id="newService">
              <option>Japanese Head Spa</option>
              <option>Hair Design</option>
              <option>Face &amp; Laser</option>
              <option>Nail Studio</option>
              <option>Massage Therapy</option>
            </select>
          </div>
          <div class="form-row-2">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="newDate" required />
            </div>
            <div class="form-group">
              <label>Time</label>
              <select id="newTime">
                <option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option>
                <option>1:00 PM</option><option>2:00 PM</option><option>3:00 PM</option>
                <option>4:00 PM</option><option>5:00 PM</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Assigned Staff</label>
            <select id="newStaff">
              <option>Andrea</option><option>Maria</option><option>Jessa</option><option>Carla</option>
            </select>
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="newNotes" rows="3" placeholder="Special requests..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-sm btn-sm-outline" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn-sm btn-sm-gold" onclick="addAppointment()">Save Appointment</button>
      </div>
    </div>
  </div>

  <!-- VIEW MODAL -->
  <div class="modal-overlay hidden" id="viewModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">Appointment Details</h3>
        <button class="modal-close" onclick="closeModal('viewModal')">&#10005;</button>
      </div>
      <div class="modal-body" id="viewModalBody"></div>
      <div class="modal-footer">
        <button class="btn-sm btn-sm-outline" onclick="closeModal('viewModal')">Close</button>
      </div>
    </div>
  </div>

  <script>
    let appointments = [
      { id:1, client:'Maria Santos',  phone:'+63 912 111 1111', service:'Nail Studio',         date:'2026-04-08', time:'9:00 AM',  staff:'Andrea', status:'Confirmed', notes:'' },
      { id:2, client:'Jessa Reyes',   phone:'+63 912 222 2222', service:'Japanese Head Spa',   date:'2026-04-08', time:'10:00 AM', staff:'Maria',   status:'Confirmed', notes:'Sensitive scalp' },
      { id:3, client:'Carla Dizon',   phone:'+63 912 333 3333', service:'Hair Design',         date:'2026-04-08', time:'11:30 AM', staff:'Jessa',   status:'Pending',   notes:'' },
      { id:4, client:'Ana Lim',       phone:'+63 912 444 4444', service:'Massage Therapy',     date:'2026-04-08', time:'1:00 PM',  staff:'Carla',   status:'Confirmed', notes:'Deep tissue' },
      { id:5, client:'Rose Tan',      phone:'+63 912 555 5555', service:'Face & Laser',        date:'2026-04-09', time:'3:00 PM',  staff:'Andrea',  status:'Pending',   notes:'' },
      { id:6, client:'Luz Garcia',    phone:'+63 912 666 6666', service:'Nail Studio',         date:'2026-04-07', time:'2:00 PM',  staff:'Maria',   status:'Completed', notes:'' },
      { id:7, client:'Tina Cruz',     phone:'+63 912 777 7777', service:'Hair Design',         date:'2026-04-06', time:'11:00 AM', staff:'Jessa',   status:'Cancelled', notes:'Client no-show' },
    ];

    let nextId = 8;
    let currentTab = 'all';

    function renderTable(data) {
      const tbody = document.getElementById('apptBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#6a4a88;padding:32px;">No appointments found.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(a => `
        <tr>
          <td style="color:#6a4a88;">#${a.id}</td>
          <td>${a.client}</td>
          <td>${a.service}</td>
          <td>${a.date}</td>
          <td>${a.time}</td>
          <td>${a.staff}</td>
          <td><span class="badge badge-${a.status.toLowerCase()}">${a.status}</span></td>
          <td style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn-sm btn-sm-outline" onclick="viewAppt(${a.id})">View</button>
            ${a.status === 'Pending' ? `<button class="btn-sm btn-sm-gold" onclick="updateStatus(${a.id},'Confirmed')">Confirm</button>` : ''}
            ${a.status === 'Confirmed' ? `<button class="btn-sm btn-sm-gold" onclick="updateStatus(${a.id},'Completed')">Complete</button>` : ''}
            ${a.status !== 'Cancelled' && a.status !== 'Completed' ? `<button class="btn-sm btn-sm-danger" onclick="updateStatus(${a.id},'Cancelled')">Cancel</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    function getFiltered() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const date   = document.getElementById('dateFilter').value;
      const status = document.getElementById('statusFilter').value;
      return appointments.filter(a => {
        const matchTab    = currentTab === 'all' || a.status.toLowerCase() === currentTab;
        const matchSearch = a.client.toLowerCase().includes(search) || a.service.toLowerCase().includes(search);
        const matchDate   = !date   || a.date === date;
        const matchStatus = !status || a.status === status;
        return matchTab && matchSearch && matchDate && matchStatus;
      });
    }

    function filterTable() { renderTable(getFiltered()); }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterTable();
    }

    function updateStatus(id, status) {
      appointments = appointments.map(a => a.id === id ? {...a, status} : a);
      filterTable();
    }

    function viewAppt(id) {
      const a = appointments.find(x => x.id === id);
      document.getElementById('viewModalBody').innerHTML = `
        <div class="admin-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Client</p><p style="color:#fff;font-size:13px;">${a.client}</p></div>
            <div><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Phone</p><p style="color:#fff;font-size:13px;">${a.phone}</p></div>
            <div><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Service</p><p style="color:#fff;font-size:13px;">${a.service}</p></div>
            <div><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Staff</p><p style="color:#fff;font-size:13px;">${a.staff}</p></div>
            <div><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Date</p><p style="color:#fff;font-size:13px;">${a.date}</p></div>
            <div><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Time</p><p style="color:#fff;font-size:13px;">${a.time}</p></div>
          </div>
          <div style="margin-top:16px;"><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Status</p><span class="badge badge-${a.status.toLowerCase()}">${a.status}</span></div>
          ${a.notes ? `<div style="margin-top:16px;"><p style="font-size:10px;color:#9a7ab8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;">Notes</p><p style="color:#e0c8f0;font-size:12px;">${a.notes}</p></div>` : ''}
        </div>
      `;
      openModal('viewModal');
    }

    function addAppointment() {
      const client  = document.getElementById('newClient').value.trim();
      const date    = document.getElementById('newDate').value;
      if (!client || !date) { alert('Please fill in required fields.'); return; }
      appointments.push({
        id: nextId++,
        client,
        phone:   document.getElementById('newPhone').value,
        service: document.getElementById('newService').value,
        date,
        time:    document.getElementById('newTime').value,
        staff:   document.getElementById('newStaff').value,
        status:  'Pending',
        notes:   document.getElementById('newNotes').value,
      });
      closeModal('addModal');
      document.getElementById('addApptForm').reset();
      filterTable();
    }

    function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    // Close on overlay click
    document.querySelectorAll('.modal-overlay').forEach(o => {
      o.addEventListener('click', e => { if (e.target === o) o.classList.add('hidden'); });
    });

    renderTable(appointments);
  </script>
</body>
</html>
